substitutions:
  device_name: test
  device_friendlyname: Test
  device_discription: "Test"
  version: "0.0.1"
  date: "28-02-2024"

esp32:
  board: esp32dev

esphome:
  name: ${device_name}
  friendly_name: ${device_friendlyname}
  comment: "${device_discription}"
  name_add_mac_suffix: false
  project:
    name: heronet.${device_name}
    version: ${version}

wifi:
  # Remove leading '#' and fill in your wifi details
  #ssid: !secret wifi_ssid
  #password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name}
    ap_timeout: 10s

api:

dashboard_import:
  package_import_url: github://heronetnl/herotools/test.yaml@dev
  import_full_config: true

packages:
  remote_package:
    url: https://github.com/heronetnl/herotools/
    ref: dev
    files:
      # Get file's
      - scripts/basic.yaml

      # Get language file
      - scripts/language/nl-NL.yaml

    refresh: 0d