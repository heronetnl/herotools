substitutions:
  device_name: mesi
  device_friendlyname: Multi_envi_sensor_inside
  device_discription: "Multi enviroment sensor inside"

  # Type of Language 
  language: "nl-NL"

  #### Measurement ####
  # Type of measurement for temperature: °C for Celcius, °F for Fahrenheit
  TM: "°C"

  #### Sensors ####
  # Type of bme: bme280, bme680, bmp085, bmp280
  BME: "bme680"

  # Type of aht: aht10, aht20, aht21
  AHT: "aht21"

  # Type of pms: pmsx003, pms5003s, pms5003t, pms5003ts, false
  PMS: "pmsx003"

  # Type of display: ili9488, false
  DISPLAY: "ili9488"

esp32:
  board: esp32dev

esphome:
  name: ${device_name}
  friendly_name: ${device_friendlyname}
  comment: "${device_discription}"
  name_add_mac_suffix: false
  project:
    name: heronet.${device_name}
    version: ${version}

wifi:
  # Remove leading '#' and fill in your wifi details
  #ssid: !secret wifi_ssid
  #password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name}
    ap_timeout: 10s

api:

dashboard_import:
  package_import_url: github://heronetnl/herotool/mesi.yaml@main
  import_full_config: true

packages:
  remote_package:
    url: https://github.com/heronetnl/herotool/
    ref: main
    files:
      # Get file's
      - scripts/basis.yaml

      # Get language file
      - scripts/language/${language}.yaml

      # Get protocols file's
      - scripts/protocols/i2c/i2c_1.yaml
      - scripts/protocols/pin/dallas_1.yaml
      - scripts/protocols/uart/pmsx003.yaml

      # Get sensor file's
      - scripts/inside/mesi/aht/${AHT}.yaml
      - scripts/inside/mesi/bme/${BME}.yaml
      - scripts/inside/mesi/pms/${PMS}.yaml
      - scripts/inside/mesi/display/${display}.yaml

    refresh: 0d