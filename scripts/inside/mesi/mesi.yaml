sensor:

  #dallas temperature sensor
	- platform: dallas
		dallas_id: dallas_1
		name: "${device_name} Temperature"
		id: temperature
		unit_of_measurement: ${TM}
		address: ${dallas_address}
		update_interval: 30s

	# SGP30 CO₂ and Volatile Organic Compound Sensor
	- platform: sgp30
    eco2:
      name: "${device_name} eCO2"
      accuracy_decimals: 1
    tvoc:
      name: "${device_name} TVOC"
      accuracy_decimals: 1
    store_baseline: yes
		i2c_id: i2c_1
    address: 0x58
    update_interval: 30s
		compensation:
			temperature_source: temperature
			humidity_source: aht-hum

	# SGP40 Volatile Organic Compound Sensor
	- platform: sgp4x
		voc:
			name: "${device_name} VOC Index"
			id: iaq
		store_baseline: true
		compensation:
			temperature_source: temperature
			humidity_source: aht-hum

# Text_sensoren
text_sensor:

	- platform: template
		name: "IAQ Classification"
		icon: "mdi:seed"
		lambda: |-
			if ( int(id(iaq).state) <= 50) {
				return {${Excellent}};
			}
			else if (int(id(iaq).state) >= 51 && int(id(iaq).state) <= 100) {
				return {${Good}};
			}
			else if (int(id(iaq).state) >= 101 && int(id(iaq).state) <= 150) {
				return {${Lightly_polluted}};
			}
			else if (int(id(iaq).state) >= 151 && int(id(iaq).state) <= 200) {
				return {${Moderately_polluted}};
			}
			else if (int(id(iaq).state) >= 201 && int(id(iaq).state) <= 250) {
				return {${Heavily_polluted}};
			}
			else if (int(id(iaq).state) >= 251 && int(id(iaq).state) <= 350) {
				return {${Severely_polluted}};
			}
			else if (int(id(iaq).state) >= 351) {
				return {${Extremely_polluted}};
			}
			else {
				return {${error}};
			}