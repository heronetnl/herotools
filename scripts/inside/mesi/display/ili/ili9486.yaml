# Screen 3,5, 320x480, 262K-color
packages:
  remote_package:
    url: https://github.com/heronetnl/herotool/
    ref: main
    files:
      - scripts/protocols/esp32/spi/spi_1.yaml
      - scripts/colors.yaml
      - scripts/fonts.yaml
    refresh: 0d

display:
  - platform: ili9xxx
    model: ili9486
    dc_pin: GPIO32
    reset_pin: GPIO33